springdoc:
  swagger-ui:
    enabled: true

jwt:
  secret: mySpringProject
  header: Authorization
  expiration: 86400
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/trpo
    username: user
    password: user
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db.changelog/db.changelog-master.xml
    enabled: true

app:
  file:
    upload-dir: uploads
